name: Playwright Tests

on:
  repository_dispatch:
    types: [trigger-from-power-automate]
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NAME: ${{ github.event.client_payload.name }}
      SOURCE: ${{ github.event.client_payload.source }}
      DESTINATION: ${{ github.event.client_payload.destination }}
      DEPARTURE_DATE: ${{ github.event.client_payload.departure_date }}
      PASSENGER_COUNT: ${{ github.event.client_payload.passenger_count }}

    steps:
      - name: Debug client payload
        run: echo '${{ toJson(github.event.client_payload) }}'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Print received data
        run: |
          echo "Name: $NAME"
          echo "From: $SOURCE"
          echo "To: $DESTINATION"
          echo "Date: $DEPARTURE_DATE"
          echo "Passengers: $PASSENGER_COUNT"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
